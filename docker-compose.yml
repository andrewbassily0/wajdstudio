version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@db:5432/wajdstudio?schema=public
      - JWT_SECRET=${JWT_SECRET:-wajd-secret-key-2024}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=wajdstudio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:

    # Note: The SQLite database file is persisted via a volume mount.
    # Ensure the local prisma/dev.db file exists or Prisma will error.
    # You can also use a named volume for the database if you prefer:
    # volumes:
    #   db-data:
    #
    # and in the service:
    # volumes:
    #   - db-data:/app/prisma
